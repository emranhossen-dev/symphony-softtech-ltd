<!DOCTYPE html>
<html>
<head>
    <title>Category Test</title>
</head>
<body>
    <h1>Category Page Test</h1>
    <p>If you can see this page, routing is working.</p>
    <p>Check browser console for errors.</p>
    <script>
        console.log('Page loaded successfully');
        fetch('/api/admin/categories/offline/admissions')
            .then(response => response.json())
            .then(data => {
                console.log('API Response:', data);
                document.body.innerHTML += '<h2>API Data:</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(error => {
                console.error('API Error:', error);
                document.body.innerHTML += '<h2>API Error:</h2><pre>' + error.message + '</pre>';
            });
    </script>
</body>
</html>
